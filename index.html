<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOKADIW Payment Page</title>
  <script>
    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        const msg = document.getElementById('copy-status');
        msg.textContent = 'คัดลอกเลขบัญชีแล้ว ✨';
        setTimeout(() => msg.textContent = 'แตะปุ่มเพื่อคัดลอกเลขบัญชี', 2200);
      }).catch(() => {
        const msg = document.getElementById('copy-status');
        msg.textContent = 'คัดลอกไม่สำเร็จ ลองกดค้างแล้วคัดลอกเอง';
      });
    }
  </script>
  <style>
    :root {
      --bg-1: #090611;
      --bg-2: #130d24;
      --panel: rgba(20, 14, 35, 0.78);
      --line: rgba(188, 120, 255, 0.45);
      --white: #f7f4ff;
      --muted: #cdb9f6;
      --pink: #ff4fd8;
      --purple: #b066ff;
      --blue: #53d8ff;
      --green: #7cffc7;
      --shadow: 0 0 18px rgba(176, 102, 255, 0.34), 0 0 48px rgba(83, 216, 255, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,79,216,0.16), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(83,216,255,0.14), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(176,102,255,0.18), transparent 30%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .grid-glow::before,
    .grid-glow::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .grid-glow::before {
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,.08));
    }

    .grid-glow::after {
      background: radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.35) 100%);
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 430px;
      padding: 28px;
      border-radius: 30px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,79,216,0.9), rgba(176,102,255,0.75), rgba(83,216,255,0.9));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      z-index: -1;
      opacity: 0.85;
    }

    .avatar {
      width: 108px;
      height: 108px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.28), transparent 28%),
        linear-gradient(135deg, rgba(255,79,216,0.85), rgba(176,102,255,0.9), rgba(83,216,255,0.86));
      box-shadow:
        0 0 24px rgba(255,79,216,0.4),
        0 0 48px rgba(83,216,255,0.28),
        inset 0 0 22px rgba(255,255,255,0.2);
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .title {
      text-align: center;
      margin: 0;
      font-size: 1.7rem;
      font-weight: 800;
      text-shadow: 0 0 12px rgba(176,102,255,0.55);
    }

    .subtitle {
      text-align: center;
      margin: 10px 0 24px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
    }

    .qr-box {
      border-radius: 24px;
      padding: 18px;
      background: rgba(9, 6, 17, 0.75);
      border: 1px solid rgba(83,216,255,0.35);
      box-shadow: inset 0 0 28px rgba(83,216,255,0.08), 0 0 28px rgba(83,216,255,0.08);
      margin-bottom: 20px;
    }

    .qr-frame {
      aspect-ratio: 1;
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(246,241,255,0.94));
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    .qr-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      padding: 18px;
      border-radius: 18px;
      box-shadow: 0 0 25px rgba(156,108,255,0.45);
      background: #ffffff;
    }

    .qr-placeholder {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      color: #2a193d;
      font-weight: 800;
      letter-spacing: 2px;
      background:
        linear-gradient(45deg, #fff 25%, #f2ebff 25%, #f2ebff 50%, #fff 50%, #fff 75%, #f2ebff 75%, #f2ebff 100%);
      background-size: 28px 28px;
    }

    .section {
      padding: 16px 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      margin-top: 14px;
    }

    .label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .value {
      word-break: break-all;
      color: var(--white);
      font-size: 0.96rem;
      line-height: 1.7;
    }

    .value a {
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px dashed rgba(255,255,255,0.45);
    }

    .wallet { box-shadow: 0 0 18px rgba(255,79,216,0.08) inset; }
    .bank { box-shadow: 0 0 18px rgba(83,216,255,0.08) inset; }

    .notice {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(124,255,199,0.08), rgba(83,216,255,0.08));
      border: 1px solid rgba(124,255,199,0.18);
      color: #e8fff6;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .copy-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 0.98rem;
      font-weight: 800;
      color: var(--white);
      cursor: pointer;
      background: linear-gradient(135deg, rgba(255,79,216,0.92), rgba(176,102,255,0.92), rgba(83,216,255,0.88));
      box-shadow: 0 0 20px rgba(176,102,255,0.28);
    }

    .copy-status {
      text-align: center;
      color: var(--muted);
      font-size: 0.84rem;
      margin-top: 2px;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      margin: 0 auto 18px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .center { display: flex; justify-content: center; }

    @media (max-width: 520px) {
      .card { padding: 22px; border-radius: 24px; }
      .title { font-size: 1.45rem; }
      .subtitle { font-size: 0.92rem; }
      .avatar { width: 92px; height: 92px; font-size: 28px; }
    }
  </style>
</head>
<body class="grid-glow">
  <main class="card">
    <div class="avatar">HK</div>
    <div class="center"><div class="tag">⚡ Neon Payment Page</div></div>
    <h1 class="title">ช่องทางโอนเงิน</h1>
    <p class="subtitle">
      ชำระค่าบริการ 💜<br />
      HOKADIW Payment
    </p>

    <section class="qr-box">
      <div class="qr-frame">
        <!-- ใส่ QR จริงแทน src ด้านล่างได้เลย -->
        <!-- <img src="your-qr.png" alt="QR Code" /> -->
        <img src="promptpay.png" alt="QR PromptPay" class="qr-img" />
      </div>
    </section>

    <section class="section wallet">
      <div class="label">💜 TrueMoney Wallet</div>
      <div class="value">
        <a href="https://tmn.app.link/ZlkGHDIhi1b" target="_blank" rel="noopener noreferrer">https://tmn.app.link/ZlkGHDIhi1b</a>
      </div>
    </section>

    <section class="section bank">
      <div class="label">🏦 KBank</div>
      <div class="value">093-329-0085</div>
    </section>

    <div class="actions">
      <button class="copy-btn" onclick="copyText('0933290085')">📋 Copy KBank Number</button>
      <a class="copy-btn" href="https://line.me/R/ti/p/~yed.tee.he3" target="_blank">📩 ส่งสลิปไป LINE</a>
      <div class="copy-status" id="copy-status">แตะปุ่มเพื่อคัดลอกเลขบัญชี หรือส่งสลิปทาง LINE</div>
    </div>
    </div>

    <section class="notice">
      ⚡ หลังโอนแล้วส่งสลิปในแชท<br />
      เพื่อให้ระบบยืนยันยอด
    </section>

    <div class="footer">HOKADIW Support Page</div>
  </main>
</body>
</html>
